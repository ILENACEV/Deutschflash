<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeutschFlash - Офлајн режим</title>
  <style>
    :root {
      --primary: #139443;
      --accent: #68E033;
      --background: #E9F3EB;
      --foreground: #1a1a1a;
      --muted: #666;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #1a1a1a;
        --foreground: #E9F3EB;
        --muted: #888;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--primary);
    }
    p {
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .features {
      background: rgba(19, 148, 67, 0.1);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .features h2 {
      font-size: 14px;
      color: var(--primary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .features ul {
      list-style: none;
    }
    .features li {
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    .features li::before {
      content: "✓";
      color: var(--primary);
      font-weight: bold;
    }
    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">✈️</span>
    <h1>Офлајн режим</h1>
    <p>Немаш интернет конекција, но можеш да продолжиш со учење!</p>
    
    <div class="features">
      <h2>Што е достапно офлајн:</h2>
      <ul>
        <li>VocaSwipe картички</li>
        <li>Германски Спелувач</li>
        <li>Сите приказни и дијалози</li>
        <li>Глаголски и Падежен Мајстор</li>
        <li>Твојот вокабулар</li>
        <li>Статистика и напредок</li>
      </ul>
    </div>
    
    <a href="/" class="btn">Врати се на почеток</a>
  </div>
</body>
</html>
